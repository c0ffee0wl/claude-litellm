# LiteLLM Proxy config — see https://docs.litellm.ai/docs/proxy/config_settings
# Public Model Names match upstream ids (no `claude-*` alias layer).
# Secrets resolve from ~/.config/litellm/env (mode 600, systemd EnvironmentFile).
# See CLAUDE.md > "Model naming" for the discovery / feature-gate trade-offs.

model_list:
  - model_name: azure/gpt-5.4
    litellm_params:
      model: azure/gpt-5.4
      api_base: os.environ/AZURE_RESOURCE_ENDPOINT
      api_version: "2025-04-01-preview"
      api_key: os.environ/AZURE_OPENAI_API_KEY

  - model_name: azure/gpt-5.4-mini
    litellm_params:
      model: azure/gpt-5.4-mini
      api_base: os.environ/AZURE_RESOURCE_ENDPOINT
      api_version: "2025-04-01-preview"
      api_key: os.environ/AZURE_OPENAI_API_KEY

litellm_settings:
  drop_params: true
  request_timeout: 600
  num_retries: 2
  json_logs: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL  # local Postgres provisioned by setup.sh Phase 6; enables /ui model management + spend/key tracking

